<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EuroTea - Corporate Registration</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container my-5" style="max-width: 500px;">
		<div class="card shadow">
			<div class="card-header bg-primary text-white text-center">
				<h3>B2B Corporate Registration</h3>
			</div>
			<div class="card-body p-4">

				<div th:if="${param.success}" class="alert alert-success">
					Registration submitted successfully! Your account is pending admin review.
				</div>

				<div th:if="${param.error}" class="alert alert-danger">
					File upload failed. Please try again.
				</div>

				<form action="/register" method="POST" enctype="multipart/form-data">
					<div class="mb-3">
						<label class="form-label">Company Name</label>
						<input type="text" name="companyName" class="form-control" required>
					</div>
					<div class="mb-3">
						<label class="form-label">Corporate Email</label>
						<input type="email" name="email" class="form-control" required>
					</div>
					<div class="mb-3">
						<label class="form-label">Password</label>
						<input type="password" name="password" class="form-control" required>
					</div>
					<div class="mb-3">
						<label class="form-label">Business Certificate (PDF only)</label>
						<input type="file" name="pdfFile" class="form-control" accept=".pdf" required>
					</div>
					<button type="submit" class="btn btn-primary w-100 mt-3">Submit Application</button>
				</form>

				<div class="text-center mt-3">
					<a href="/shop" class="text-decoration-none">← Back to Shop</a>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
