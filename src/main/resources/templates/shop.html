<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EuroTea - Shop</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="#"><b>EuroTea</b></a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link active" href="/shop">Shop</a>
				<a class="nav-link" href="#">Cart (0)</a>
			</div>
		</div>
	</nav>

	<div class="container my-5">
		<h2 class="mb-4 text-center">Our Premium Taiwanese Tea</h2>

		<div class="row">
			<div class="col-md-4 mb-4" th:each="product : ${products}">
				<div class="card h-100 shadow-sm">
					<div class="card-body text-center">
						<h5 class="card-title" th:text="${product.name}">Tea Name</h5>
						<p class="text-muted">Premium Quality</p>
						<h4 class="text-success" th:text="'€ ' + ${product.price}">€ 0.00</h4>
						<p class="card-text">Stock Level: <span th:text="${product.stockLevel}">0</span></p>
						<button class="btn btn-primary w-100">Add to Cart</button>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
