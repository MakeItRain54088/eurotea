<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EuroTea - Order Placed</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<nav th:replace="~{fragments :: navbar('cart')}"></nav>

	<div class="container my-5 text-center">
		<div class="card shadow-sm mx-auto p-5" style="max-width: 600px;">
			<div class="text-success mb-3" style="font-size: 4rem;">✓</div>
			<h2>Thank You for Your Order!</h2>
			<p class="text-muted">Your order has been recorded successfully in the database.</p>

			<!-- order can be null if the id in the URL doesn't exist, so guard against that -->
			<div class="bg-light p-3 rounded text-start my-4" th:if="${order != null}">
				<p class="mb-1"><strong>Order Reference:</strong> #<span th:text="${order.id}">1001</span></p>
				<p class="mb-1"><strong>Total Amount:</strong> €<span
						th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></p>
				<p class="mb-1"><strong>Shipping To:</strong> <span th:text="${order.shippingAddress}">Address</span></p>
				<p class="mb-0"><strong>Status:</strong> <span class="badge bg-success" th:text="${order.status}">PAID</span>
				</p>
			</div>

			<div>
				<a href="/shop" class="btn btn-primary px-4">Continue Shopping</a>
			</div>
		</div>
	</div>

</body>

</html>
