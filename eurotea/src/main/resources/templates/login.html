<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EuroTea - Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
	<div class="container my-5" style="max-width: 400px;">
		<div class="card shadow mt-5">
			<div class="card-header bg-dark text-white text-center py-3">
				<h5 class="mb-0">EuroTea Portal Login</h5>
			</div>
			<div class="card-body p-4">
				<div th:if="${param.error}" class="alert alert-danger small py-2">
					Invalid email, password, or unauthorized access.
				</div>

				<form action="/login" method="POST">
					<div class="mb-3">
						<label class="form-label small fw-bold">Email Address</label>
						<input type="email" name="email" class="form-control" required placeholder="admin@eurotea.com">
					</div>
					<div class="mb-3">
						<label class="form-label small fw-bold">Password</label>
						<input type="password" name="password" class="form-control" required placeholder="••••••••">
					</div>
					<button type="submit" class="btn btn-dark w-100 mt-2">Login</button>
				</form>
				<div class="text-center mt-3 small">
					<a href="/register" class="text-decoration-none">Register B2B Account</a> |
					<a href="/shop" class="text-decoration-none">Guest Shop</a>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
