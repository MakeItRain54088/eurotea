<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EuroTea - Shopping Cart</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<!-- NAVIGATION BAR -->
	<nav th:replace="~{fragments :: navbar('cart')}"></nav>

	<div class="container my-5" style="max-width: 800px;">

		<h2 class="mb-4 text-center fw-bold">Your Tea Cart</h2>

		<div class="card shadow-sm">
			<div class="card-body p-4">

				<!-- EMPTY CART STATE -->
				<div th:if="${cartItems == null or cartItems.isEmpty()}" class="text-center py-5">
					<p class="text-muted fs-5">Your cart is currently empty.</p>
					<a href="/shop" class="btn btn-primary">Browse Tea Catalog</a>
				</div>

				<!-- CART CONTENT TABLE -->
				<div th:if="${cartItems != null and !cartItems.isEmpty()}">
					<table class="table align-middle">
						<thead>
							<tr>
								<th>Product</th>
								<th class="text-center">Unit Price</th>
								<th class="text-center">Quantity (kg)</th>
								<th class="text-end">Subtotal</th>
								<th></th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="item : ${cartItems}">
								<td class="fw-bold" th:text="${item.productName}">Tea Name</td>
								<td class="text-center" th:text="'€ ' + ${item.price}">€ 0.00</td>
								<td class="text-center" style="width: 220px;">
									<!-- min="1" is just a UI hint, setting qty to 0 removes the line server-side -->
									<form th:action="@{/cart/update}" method="post"
										class="d-flex justify-content-center align-items-center gap-2">
										<input type="hidden" name="productId" th:value="${item.productId}" />
										<input type="number" name="quantity" th:value="${item.quantity}" min="1"
											class="form-control form-control-sm text-center" style="width: 70px;" />
										<button type="submit" class="btn btn-outline-secondary btn-sm">Update</button>
									</form>
								</td>
								<td class="text-end fw-bold text-success"
									th:text="'€ ' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">€ 0.00</td>
								<td class="text-end">
									<form th:action="@{/cart/remove}" method="post">
										<input type="hidden" name="productId" th:value="${item.productId}" />
										<button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>

					<hr class="my-4">

					<div class="d-flex justify-content-between align-items-center mb-4">
						<h4 class="mb-0">Grand Total:</h4>
						<h3 class="text-success fw-bold mb-0" th:text="'€ ' + ${#numbers.formatDecimal(grandTotal, 1, 2)}">€ 0.00
						</h3>
					</div>

					<a href="/checkout" class="btn btn-success btn-lg">Proceed to Checkout ➔</a>
				</div>

			</div>
		</div>

		<div class="text-center mt-3">
			<a href="/shop" class="text-secondary text-decoration-none">← Continue Shopping</a>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
