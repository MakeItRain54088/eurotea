<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>EuroTea - Shopping Cart</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<!-- NAVIGATION BAR -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/shop"><b>EuroTea</b></a>
			<div class="navbar-nav ms-auto align-items-center">
				<a class="nav-link me-2" href="/shop">Shop</a>
				<a class="nav-link active me-3" href="/cart">
					Cart (<span th:text="${session.cart != null ? session.cart.size() : 0}">0</span>)
				</a>
			</div>
		</div>
	</nav>

	<div class="container my-5" style="max-width: 800px;">

		<h2 class="mb-4 text-center fw-bold">Your Tea Cart</h2>

		<!-- CHECKOUT SUCCESS ALERT -->
		<div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
			<strong>Order Placed Successfully!</strong> Thank you for buying with EuroTea. A confirmation email has been sent.
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>

		<div class="card shadow-sm">
			<div class="card-body p-4">

				<!-- EMPTY CART STATE -->
				<div th:if="${cartItems == null or cartItems.isEmpty()}" class="text-center py-5">
					<p class="text-muted fs-5">Your cart is currently empty.</p>
					<a href="/shop" class="btn btn-primary">Browse Tea Catalog</a>
				</div>

				<!-- CART CONTENT TABLE -->
				<div th:if="${cartItems != null and !cartItems.isEmpty()}">
					<table class="table align-middle">
						<thead>
							<tr>
								<th>Product</th>
								<th class="text-center">Unit Price</th>
								<th class="text-center">Quantity (kg)</th>
								<th class="text-end">Subtotal</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="item : ${cartItems}">
								<td class="fw-bold" th:text="${item.productName}">Tea Name</td>
								<td class="text-center" th:text="'€ ' + ${item.priceUsed}">€ 0.00</td>
								<td class="text-center" th:text="${item.quantity}">1</td>
								<td class="text-end fw-bold text-success"
									th:text="'€ ' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">€ 0.00</td>
							</tr>
						</tbody>
					</table>

					<hr class="my-4">

					<div class="d-flex justify-content-between align-items-center mb-4">
						<h4 class="mb-0">Grand Total:</h4>
						<h3 class="text-success fw-bold mb-0" th:text="'€ ' + ${#numbers.formatDecimal(grandTotal, 1, 2)}">€ 0.00
						</h3>
					</div>

					<!-- SIMULATED CHECKOUT FORM -->
					<form action="/cart/checkout" method="post">
						<button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Proceed to Checkout (Demo)</button>
					</form>
				</div>

			</div>
		</div>

		<div class="text-center mt-3">
			<a href="/shop" class="text-secondary text-decoration-none">← Continue Shopping</a>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
